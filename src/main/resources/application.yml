spring:
  application:
    name: chatbot-backend

  config:
    import: optional:application-secret.yml

  datasource:
    url: jdbc:h2:mem:chatbot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  port: 8080

jwt:
  access-token-expiration-seconds: 3600

openai:
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini